name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-check:
    name: Build Docker image (sanity check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (không push, chỉ để chắc Dockerfile build được)
        run: docker build -t webapphdr:ci .

  deploy:
    name: Deploy to Linux server via SSH
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: SSH vào server, kéo code mới, build lại container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker image prune -f
