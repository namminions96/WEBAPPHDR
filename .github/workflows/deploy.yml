name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-check:
    name: Build Docker image (sanity check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (không push, chỉ để chắc Dockerfile build được)
        run: docker build -t webapphdr:ci .

  deploy:
    name: Deploy (self-hosted runner chạy ngay trên server)
    needs: build-check
    runs-on: [self-hosted, hdr_web_app]
    steps:
      # clean: false — mặc định actions/checkout dọn sạch workspace (git clean -ffdx)
      # trước khi checkout; tắt đi để không đụng tới các thứ khác server tự sinh ra
      # (vd cache build, log...). File .env giờ được tạo lại từ secret ở bước dưới
      # nên không còn phụ thuộc vào việc "giữ file cũ qua các lần chạy" nữa.
      - uses: actions/checkout@v4
        with:
          clean: false

      # Ghi .env từ secret ENV_FILE (Settings -> Secrets and variables -> Actions).
      # Dùng biến môi trường (env:) thay vì nhúng thẳng ${{ secrets.ENV_FILE }} vào
      # chuỗi lệnh — nếu nội dung .env có dấu ", `, $(...) thì nhúng thẳng có thể vỡ
      # lệnh shell hoặc bị hiểu nhầm thành lệnh khác.
      - name: Tạo file .env từ secret
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "::error::Secret ENV_FILE đang trống hoặc chưa được tạo (Settings -> Secrets and variables -> Actions)."
            exit 1
          fi
          printf '%s\n' "$ENV_FILE" > .env
          chmod 600 .env

      - name: Build lại image & restart container
        run: |
          docker compose up -d --build --remove-orphans
          docker image prune -f
