name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-check:
    name: Build Docker image (sanity check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (không push, chỉ để chắc Dockerfile build được)
        run: docker build -t webapphdr:ci .

  deploy:
    name: Deploy (self-hosted runner chạy ngay trên server)
    needs: build-check
    runs-on: [self-hosted, hdr_web_app]
    steps:
      # clean: false — GIỮ file .env (gitignored) qua các lần checkout.
      # Mặc định actions/checkout dọn sạch workspace (git clean -ffdx) trước khi checkout,
      # sẽ xóa mất .env nếu không tắt clean.
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Kiểm tra .env đã có chưa
        run: |
          if [ ! -f .env ]; then
            echo "::error::Thiếu file .env trong $(pwd). Chạy 1 lần: cp .env.example .env && điền AUTOFOTELLO_SECRET, rồi chạy lại workflow."
            exit 1
          fi

      - name: Build lại image & restart container
        run: |
          docker compose up -d --build --remove-orphans
          docker image prune -f
